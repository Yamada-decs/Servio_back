<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <style>
       
		body {
		    font-family: Arial, sans-serif;
		    font-size: 12px;
		    margin: 0;
		}
		h2 {
		    text-align: center;
		    margin-bottom: 20px;
		}
		table {
		    width: 100%;
		    border-collapse: collapse;
		}
		.sale-block {
		    margin-bottom: 20px;
		    page-break-inside: avoid;
		}
        .info-table {
            width: 100%;
            margin-bottom: 25px;
        }

        .info-table td {
            vertical-align: middle;   /* 👈 ahora todo se centra verticalmente */
        }

        .data-table {
            width: 100%;
        }

        .data-table td {
            padding: 4px 0;
        }

        .label {
            font-weight: bold;
        }

        .amount {
            text-align: right;
            padding-left: 20px;
        }

        /* 🔥 LOGO CENTRADO */
        .logo {
            text-align: center;       /* centro horizontal */
            vertical-align: middle;   /* centro vertical */
        }

        .logo img {
            width: 300px;  /* 👈 más grande */
            height: auto;
        }

        table.report { 
            width: 100%; 
            border-collapse: collapse; 
        }

        table.report th, 
        table.report td { 
            border: 1px solid black; 
            padding: 6px; 
            text-align: center; 
        }

        table.report th { 
            background-color: #f2f2f2; 
        }

        .sale-block {
            margin-bottom: 20px;
            page-break-inside: avoid; /* evita cortar una venta en dos páginas */
        }

        .sale-main {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 8px;
        }

        .sale-main th,
        .sale-main td {
            border: 1px solid black;
            padding: 6px;
            font-size: 12px;
            text-align: center;
        }

        .sale-main th {
            background-color: #f2f2f2;
        }

        .sale-main .cliente {
            width: 30%; /* 👈 más espacio al cliente */
            text-align: left;
        }

        .sub-section {
            width: 85%;              /* mismo ancho que la tabla */
            margin-left: auto;       /* 👈 la empuja a la derecha */
            font-size: 11px;
            margin-bottom: 5px;
        }

        .sub-section-title {
            font-weight: bold;
            margin-bottom: 3px;
            text-align: left;        /* mantiene el texto alineado normal */
            margin-left: 40px;  /* 👈 esto es el "TAB" */
        }

        .sub-table {
            width: 100%;             /* ahora ocupa todo el ancho del sub-section */
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .sub-table td {
            padding: 3px 0;
            font-size: 11px;
        }

        .sub-table td.amount {
            text-align: right;
        }
        .estado {
		    font-weight: bold;
		    padding: 4px;
		}
		
		.estado-deuda {
		    background-color: #d9534f; /* rojo */
		    color: white;
		}
		
		.estado-parcial {
		    background-color: #f0ad4e; /* amarillo */
		    color: black;
		}
    </style>
</head>
<body>
<div>

<h2>REPORTE DE VENTAS</h2>

<table class="info-table">
    <tr>
        <!-- Columna izquierda -->
        <td width="25%">
            <table class="data-table">
                <tr>
                    <td class="label">Fecha:</td>
                    <td class="amount"></td>
                </tr>
                <tr>
                    <td class="label">Total Efectivo:</td>
                    <td class="amount" th:text="${'S/ ' + report.totalEfectivo}"></td>
                </tr>
                <tr>
                    <td class="label">Total Yape:</td>
                    <td class="amount" th:text="${'S/ ' + report.totalYape}"></td>
                </tr>
            </table>
        </td>

        <!-- Columna centro -->
        <td width="25%">
            <table class="data-table">
                <tr>
                    <td class="label"></td>
                    <td class="amount" th:text="${#temporals.format(report.date,'dd/MM/yyyy')}"></td>
                </tr>
                <tr>
                    <td class="label">Total Deudas:</td>
                    <td class="amount">S/ 0.00</td>
                </tr>
                <tr>
                    <td class="label">Total Ventas:</td>
                    <td class="amount" th:text="${'S/ ' + report.totalGeneral}"></td>
                </tr>
            </table>
        </td>

        <!-- Columna derecha SOLO LOGO -->
        <td width="50%" class="logo">
            <img src="https://imagenes.elpais.com/resizer/v2/Y3W6QUFBBZLLTALRW6NBRPZ2RA.jpg?auth=d68f18251117888479d8fdc3210796bc86d9d3f41719da72c2877bcafc3504ea;width=1960;height=1103;smart=true" alt="Logo Empresa"></img>
        </td>
    </tr>
</table>

<div th:each="sale : ${report.sales}" class="sale-block">

    <!-- TABLA PRINCIPAL DE LA VENTA -->
    <table class="sale-main">
        <tr>
            <th>Código</th>
            <th class="cliente">Cliente</th>
            <th>Total</th>
            <th>Descuento</th>
            <th>Precio Final</th>
            <th>Remaining</th>
            <th>Estado</th>
        </tr>
        <tr>
            <td th:text="${sale.id}"></td>
            <td class="cliente" th:text="${sale.customerName != null ? sale.customerName : sale.comment}"></td>
            <td th:text="${'S/ ' + sale.total}"></td>
			<td th:text="${
			    sale.dicountType == 'PORCENTAJE' 
			        ? '% ' + sale.discountAmount 
			        : 'S/ ' + sale.discountAmount
			}"></td>
			<td th:text="${'S/ ' + sale.finalPrice}"></td>
			<td th:text="${'S/ ' + sale.remaining}"></td>
			<td 
			    th:text="${sale.state}"
			    class="estado"
			    th:classappend="
			        ${sale.state == 'DEUDA'} ? ' estado-deuda' :
			        (${sale.state == 'PARCIAL'} ? ' estado-parcial' : '')
			    ">
			</td>
        </tr>
    </table>

    <!-- DETALLES -->
    <div style="font-weight:bold; border-bottom:1px solid black; margin-top:10px;">
	    DETALLES
	</div>
    <div class="sub-section">

        <table class="sub-table">
            <tr th:each="detail : ${sale.details}">
                <td th:text="${detail.productName}"></td>
                <td class="amount" th:text="${'S/ ' + detail.unitPrice + ' X UNI'}"></td>
                <td class="amount" th:text="${detail.quantity + ' UNI'}"></td>
                <td class="amount" th:text="${'S/ ' + detail.subTotal}"></td>
            </tr>
            <tr th:if="${sale.deliveryAddress != null}">
			    <td th:text="${'Delivery ' + sale.deliveryAddress}"></td>
			    <td class="amount"></td>
			    <td class="amount">1 SERV</td>
			    <td class="amount" th:text="${'S/ ' + sale.deliveryPrice}"></td>
			</tr>
        </table>
    </div>

    <!-- PAGOS-->
    <div style="font-weight:bold; border-bottom:1px solid black; margin-top:10px;">
	    PAGOS
	</div>
    <div class="sub-section">

        <table class="sub-table">
            <tr th:each="payment : ${sale.payments}">
                <td th:text="${payment.paymentMethod}"></td>
                <td class="amount" th:text="${'S/ ' + payment.amount}"></td>
            </tr>
        </table>
    </div>

</div>
</div>
</body>
</html>
